spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6370  # embedded Redis test port

  cache:
    type: redis

movie:
  api:
    omdb:
      base-url: http://localhost
      api-key: test_omdb_key
    tmdb:
      base-url: http://localhost
      api-key: test_tmdb_key
